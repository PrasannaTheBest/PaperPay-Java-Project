# ================================================================
# PaperPay Backend — Application Properties
# ================================================================

# Server
server.port=8080

# H2 Database Configuration (File-based)
spring.datasource.url=jdbc:h2:file:./data/paperpay_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
paperpay.jwt.secret=4e6f4f3c2d1a7b8c9f0e1d2c3b4a5968778695a4b3c2d1e0f9e8d7c6b5a4f3e2
paperpay.jwt.expiration=86400000

# CORS (handled in CorsConfig.java — this is just documentation)
# Allowed Origin: http://localhost:3000

# Logging
logging.level.com.paperpay=INFO
logging.level.org.springframework.security=WARN
